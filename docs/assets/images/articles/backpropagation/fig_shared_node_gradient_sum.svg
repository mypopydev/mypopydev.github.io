<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480">
  <rect width="1200" height="480" fill="#ffffff"/>
  <defs>
    <marker id="arrowBlue8" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed8" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <text x="600" y="42" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">图 4  共享节点处的梯度汇聚</text>
  <text x="600" y="74" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#4b5563">例子：u = x · y，v = x · w，L = u + v</text>

  <circle cx="150" cy="120" r="38" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="128" text-anchor="middle" font-size="24" font-family="Times New Roman, Arial" fill="#1e3a8a">y</text>

  <circle cx="150" cy="240" r="44" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="150" y="248" text-anchor="middle" font-size="26" font-family="Times New Roman, Arial" fill="#991b1b">x</text>

  <circle cx="150" cy="360" r="38" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="368" text-anchor="middle" font-size="24" font-family="Times New Roman, Arial" fill="#1e3a8a">w</text>

  <rect x="330" y="88" rx="18" ry="18" width="120" height="64" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="390" y="128" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#3730a3">乘法 ×</text>

  <rect x="330" y="328" rx="18" ry="18" width="120" height="64" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="390" y="368" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#3730a3">乘法 ×</text>

  <circle cx="620" cy="240" r="56" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="620" y="230" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">求和</text>
  <text x="620" y="258" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#374151">L = u + v</text>

  <rect x="850" y="190" rx="18" ry="18" width="210" height="100" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="955" y="228" text-anchor="middle" font-size="26" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#991b1b">反向聚合点</text>
  <text x="955" y="258" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#b91c1c">x 同时影响 u 与 v</text>

  <line x1="188" y1="120" x2="330" y2="120" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue8)"/>
  <line x1="194" y1="220" x2="330" y2="138" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue8)"/>
  <line x1="194" y1="260" x2="330" y2="342" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue8)"/>
  <line x1="188" y1="360" x2="330" y2="360" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue8)"/>
  <line x1="450" y1="120" x2="566" y2="214" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue8)"/>
  <line x1="450" y1="360" x2="566" y2="266" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue8)"/>

  <line x1="850" y1="320" x2="676" y2="320" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed8)"/>
  <text x="764" y="306" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#dc2626">\bar L = 1</text>

  <line x1="566" y1="320" x2="450" y2="320" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed8)"/>
  <line x1="566" y1="340" x2="450" y2="380" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed8)"/>
  <text x="514" y="306" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#dc2626">\bar u</text>
  <text x="514" y="392" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#dc2626">\bar v</text>

  <line x1="330" y1="320" x2="194" y2="254" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed8)"/>
  <line x1="330" y1="400" x2="194" y2="266" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed8)"/>
  <text x="245" y="210" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#dc2626">\bar u · y</text>
  <text x="250" y="330" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#dc2626">\bar v · w</text>

  <rect x="820" y="84" rx="16" ry="16" width="270" height="74" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="955" y="116" text-anchor="middle" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#9a3412">共享节点的总梯度不是覆盖，而是求和</text>
  <text x="955" y="144" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#c2410c">\bar x = \bar u · y + \bar v · w</text>

  <rect x="90" y="410" rx="14" ry="14" width="1020" height="40" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="600" y="436" text-anchor="middle" font-size="17" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#374151">这正是一般递推公式 \bar v_i = Σ_{j∈Ch(i)} \bar v_j · (∂v_j / ∂v_i) 在最小 DAG 上的直观版本。</text>
</svg>