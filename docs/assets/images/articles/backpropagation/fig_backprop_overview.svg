<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#ffffff"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <text x="600" y="42" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">图 1  前向计算与反向传播总览</text>
  <text x="600" y="74" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#4b5563">蓝色表示前向计算，红色表示从损失出发的梯度回传</text>

  <rect x="70" y="150" rx="18" ry="18" width="140" height="90" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="188" text-anchor="middle" font-size="26" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e3a8a">输入 x</text>
  <text x="140" y="216" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e40af">特征进入网络</text>

  <rect x="280" y="130" rx="18" ry="18" width="170" height="130" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="365" y="178" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e3a8a">隐藏层 1</text>
  <text x="365" y="206" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e40af">z¹ = W¹x + b¹</text>
  <text x="365" y="230" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e40af">a¹ = σ(z¹)</text>

  <rect x="520" y="130" rx="18" ry="18" width="170" height="130" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="605" y="178" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e3a8a">隐藏层 2</text>
  <text x="605" y="206" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e40af">z² = W²a¹ + b²</text>
  <text x="605" y="230" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e40af">a² = σ(z²)</text>

  <rect x="760" y="150" rx="18" ry="18" width="150" height="90" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="835" y="188" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e3a8a">输出 ŷ</text>
  <text x="835" y="216" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e40af">预测结果</text>

  <rect x="980" y="150" rx="18" ry="18" width="150" height="90" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="1055" y="188" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#991b1b">损失 L</text>
  <text x="1055" y="216" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#b91c1c">比较 ŷ 与 y</text>

  <line x1="210" y1="195" x2="280" y2="195" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="450" y1="195" x2="520" y2="195" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="690" y1="195" x2="760" y2="195" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="910" y1="195" x2="980" y2="195" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <line x1="980" y1="295" x2="910" y2="295" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed)"/>
  <line x1="760" y1="295" x2="690" y2="295" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed)"/>
  <line x1="520" y1="295" x2="450" y2="295" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed)"/>
  <line x1="280" y1="295" x2="210" y2="295" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed)"/>

  <text x="605" y="120" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#2563eb">前向：逐层生成中间表示</text>
  <text x="605" y="324" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#dc2626">反向：从 ∂L/∂ŷ 开始递推每层梯度</text>

  <rect x="265" y="338" rx="10" ry="10" width="670" height="52" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="600" y="370" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">核心思想：前向负责“算值”，反向负责“算敏感度”；同一批中间量被重复复用，所以效率高</text>
</svg>