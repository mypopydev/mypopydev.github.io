<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#ffffff"/>
  <defs>
    <marker id="arrowBlue7" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed7" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <text x="600" y="42" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">图 7  前向模式 AD 与反向模式 AD 的 Jacobian 方向图</text>
  <text x="600" y="74" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#4b5563">同一个 Jacobian，前向模式传播的是方向向量，反向模式传播的是敏感度向量</text>

  <rect x="70" y="120" rx="18" ry="18" width="480" height="360" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="310" y="160" text-anchor="middle" font-size="26" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">前向模式 AD</text>
  <text x="310" y="190" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#2563eb">Jacobian-向量乘积（JVP）</text>

  <circle cx="170" cy="290" r="52" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="170" y="282" text-anchor="middle" font-size="24" font-family="Times New Roman, Arial" fill="#1e3a8a">输入</text>
  <text x="170" y="312" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#1e3a8a">x</text>

  <rect x="275" y="238" rx="18" ry="18" width="120" height="104" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="335" y="283" text-anchor="middle" font-size="24" font-family="Times New Roman, Arial" fill="#3730a3">f</text>
  <text x="335" y="312" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#3730a3">Jacobian J</text>

  <circle cx="470" cy="290" r="52" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="470" y="282" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#166534">输出</text>
  <text x="470" y="312" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#166534">y = f(x)</text>

  <line x1="222" y1="290" x2="275" y2="290" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrowBlue7)"/>
  <line x1="395" y1="290" x2="418" y2="290" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrowBlue7)"/>

  <line x1="120" y1="212" x2="250" y2="212" stroke="#2563eb" stroke-width="6" marker-end="url(#arrowBlue7)"/>
  <text x="185" y="196" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#2563eb">种子向量 v</text>
  <line x1="420" y1="212" x2="520" y2="212" stroke="#2563eb" stroke-width="6" marker-end="url(#arrowBlue7)"/>
  <text x="470" y="196" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#2563eb">Jv</text>

  <text x="310" y="392" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#374151">沿着输入方向 v，追踪输出如何变化</text>
  <text x="310" y="424" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#374151">适合输入维度小、想看很多输出分量的场景</text>

  <rect x="650" y="120" rx="18" ry="18" width="480" height="360" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="890" y="160" text-anchor="middle" font-size="26" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">反向模式 AD</text>
  <text x="890" y="190" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#dc2626">向量-Jacobian 乘积（VJP）</text>

  <circle cx="750" cy="290" r="52" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="750" y="282" text-anchor="middle" font-size="24" font-family="Times New Roman, Arial" fill="#1e3a8a">输入</text>
  <text x="750" y="312" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#1e3a8a">x</text>

  <rect x="855" y="238" rx="18" ry="18" width="120" height="104" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="915" y="283" text-anchor="middle" font-size="24" font-family="Times New Roman, Arial" fill="#3730a3">f</text>
  <text x="915" y="312" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#3730a3">Jacobian J</text>

  <circle cx="1050" cy="290" r="52" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="1050" y="282" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#166534">输出</text>
  <text x="1050" y="312" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#166534">y = f(x)</text>

  <line x1="802" y1="290" x2="855" y2="290" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrowBlue7)"/>
  <line x1="975" y1="290" x2="998" y2="290" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrowBlue7)"/>

  <line x1="1100" y1="212" x2="980" y2="212" stroke="#dc2626" stroke-width="6" marker-end="url(#arrowRed7)"/>
  <text x="1040" y="196" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#dc2626">种子敏感度 uᵀ</text>
  <line x1="850" y1="212" x2="700" y2="212" stroke="#dc2626" stroke-width="6" marker-end="url(#arrowRed7)"/>
  <text x="775" y="196" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#dc2626">uᵀJ</text>

  <text x="890" y="392" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#374151">从输出敏感度往回传，追踪输入该承担多少变化</text>
  <text x="890" y="424" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#374151">适合输出维度小，尤其是标量损失 L 的训练场景</text>

  <rect x="150" y="500" rx="14" ry="14" width="900" height="40" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="600" y="526" text-anchor="middle" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">神经网络训练通常关心 L: R^n → R，因此一次反向传播就能得到关于所有参数的梯度</text>
</svg>