<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#ffffff"/>
  <defs>
    <marker id="arrowBlue10" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed10" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <text x="600" y="42" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">图 11  广播加法中偏置梯度沿批次维求和</text>
  <text x="600" y="74" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#4b5563">例子：Y = X + b，其中 X ∈ ℝ^{B×d}，b ∈ ℝ^d</text>

  <rect x="86" y="120" rx="16" ry="16" width="170" height="72" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="171" y="150" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#1e3a8a">x₁,: ∈ ℝᵈ</text>
  <text x="171" y="178" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1d4ed8">第 1 个样本</text>

  <rect x="86" y="238" rx="16" ry="16" width="170" height="72" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="171" y="268" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#1e3a8a">x₂,: ∈ ℝᵈ</text>
  <text x="171" y="296" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1d4ed8">第 2 个样本</text>

  <rect x="86" y="356" rx="16" ry="16" width="170" height="72" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="171" y="386" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#1e3a8a">x_B,: ∈ ℝᵈ</text>
  <text x="171" y="414" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1d4ed8">第 B 个样本</text>

  <rect x="310" y="54" rx="18" ry="18" width="220" height="84" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="420" y="88" text-anchor="middle" font-size="24" font-family="Times New Roman, Arial" fill="#991b1b">b ∈ ℝᵈ</text>
  <text x="420" y="118" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#b91c1c">同一个共享偏置参数</text>

  <circle cx="424" cy="156" r="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <circle cx="424" cy="274" r="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <circle cx="424" cy="392" r="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="424" y="162" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#92400e">+</text>
  <text x="424" y="280" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#92400e">+</text>
  <text x="424" y="398" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#92400e">+</text>

  <rect x="570" y="120" rx="16" ry="16" width="180" height="72" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="660" y="150" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#166534">y₁,: = x₁,: + b</text>
  <text x="660" y="178" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#166534">广播后的第 1 行</text>

  <rect x="570" y="238" rx="16" ry="16" width="180" height="72" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="660" y="268" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#166534">y₂,: = x₂,: + b</text>
  <text x="660" y="296" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#166534">广播后的第 2 行</text>

  <rect x="570" y="356" rx="16" ry="16" width="180" height="72" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="660" y="386" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#166534">y_B,: = x_B,: + b</text>
  <text x="660" y="414" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#166534">广播后的第 B 行</text>

  <rect x="850" y="206" rx="18" ry="18" width="250" height="118" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="975" y="238" text-anchor="middle" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#9a3412">沿批次维聚合</text>
  <text x="975" y="272" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#c2410c">∂L/∂b = Σ_i ∂L/∂y_i,: </text>
  <text x="975" y="302" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#c2410c">不是 B 份独立参数，而是一个共享参数</text>

  <line x1="256" y1="156" x2="406" y2="156" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue10)"/>
  <line x1="256" y1="274" x2="406" y2="274" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue10)"/>
  <line x1="256" y1="392" x2="406" y2="392" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue10)"/>
  <line x1="420" y1="138" x2="420" y2="174" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue10)"/>
  <line x1="420" y1="138" x2="420" y2="292" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue10)"/>
  <line x1="420" y1="138" x2="420" y2="410" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue10)"/>
  <line x1="442" y1="156" x2="570" y2="156" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue10)"/>
  <line x1="442" y1="274" x2="570" y2="274" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue10)"/>
  <line x1="442" y1="392" x2="570" y2="392" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue10)"/>

  <line x1="750" y1="156" x2="850" y2="228" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed10)"/>
  <line x1="750" y1="274" x2="850" y2="265" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed10)"/>
  <line x1="750" y1="392" x2="850" y2="302" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed10)"/>
  <text x="802" y="194" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#dc2626">\bar y₁,: </text>
  <text x="800" y="252" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#dc2626">\bar y₂,: </text>
  <text x="804" y="362" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#dc2626">\bar y_B,: </text>

  <line x1="975" y1="324" x2="975" y2="458" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed10)"/>
  <rect x="855" y="458" rx="18" ry="18" width="240" height="64" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="975" y="486" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#991b1b">偏置的梯度</text>
  <text x="975" y="512" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#991b1b">∂L/∂b ∈ ℝᵈ</text>
</svg>