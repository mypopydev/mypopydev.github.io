<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430">
  <rect width="1200" height="430" fill="#ffffff"/>
  <defs>
    <marker id="arrowRed3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrowGray3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#6b7280"/>
    </marker>
  </defs>
  <text x="600" y="42" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">图 12  信用分配（credit assignment）与逐层梯度分解</text>
  <text x="600" y="74" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#4b5563">每一层只做局部计算，但最终得到的是对全局损失的贡献</text>

  <rect x="110" y="155" rx="18" ry="18" width="170" height="100" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="195" y="194" text-anchor="middle" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#312e81">第 l 层激活</text>
  <text x="195" y="226" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#312e81">a^(l-1)</text>

  <rect x="360" y="135" rx="18" ry="18" width="220" height="140" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="470" y="178" text-anchor="middle" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e3a8a">线性 + 激活</text>
  <text x="470" y="214" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#1e40af">z^(l) = W^(l)a^(l-1)+b^(l)</text>
  <text x="470" y="244" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#1e40af">a^(l) = σ(z^(l))</text>

  <rect x="675" y="155" rx="18" ry="18" width="170" height="100" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="760" y="194" text-anchor="middle" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#166534">上游梯度</text>
  <text x="760" y="226" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#166534">δ^(l+1)</text>

  <rect x="930" y="135" rx="18" ry="18" width="170" height="140" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="1015" y="178" text-anchor="middle" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#991b1b">当前层误差</text>
  <text x="1015" y="214" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#991b1b">δ^(l)</text>
  <text x="1015" y="244" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#b91c1c">= (W^(l+1))ᵀδ^(l+1) ⊙ σ'(z^(l))</text>

  <line x1="280" y1="205" x2="360" y2="205" stroke="#6b7280" stroke-width="4" marker-end="url(#arrowGray3)"/>
  <line x1="675" y1="205" x2="580" y2="205" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed3)"/>
  <line x1="580" y1="205" x2="930" y2="205" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed3)" opacity="0"/>
  <line x1="580" y1="205" x2="930" y2="205" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed3)"/>

  <rect x="260" y="315" rx="16" ry="16" width="680" height="70" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="600" y="346" text-anchor="middle" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">局部规则：当前层梯度 = 上游梯度 × 本层局部导数</text>
  <text x="600" y="372" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#111827">∂L/∂W^(l) = δ^(l)(a^(l-1))ᵀ,   ∂L/∂b^(l) = δ^(l)</text>
</svg>