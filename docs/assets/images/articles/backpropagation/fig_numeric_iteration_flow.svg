<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <rect width="1400" height="760" fill="#ffffff"/>
  <defs>
    <marker id="arrowBlue12" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed12" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrowGreen12" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <style>
      .cn-title { font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .cn { font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1f2937; }
      .math { font-family: "Times New Roman", Arial, serif; fill: #111827; }
      .small { font-size: 14px; }
      .mid { font-size: 16px; }
      .large { font-size: 22px; }
      .red { fill: #b91c1c; }
      .blue { fill: #1d4ed8; }
      .green { fill: #166534; }
      .muted { fill: #6b7280; }
    </style>
  </defs>

  <text x="700" y="34" text-anchor="middle" font-size="28" class="cn-title">图 8  一次完整训练迭代的数值流向（2-2-2 网络）</text>
  <text x="700" y="62" text-anchor="middle" font-size="16" class="cn muted">蓝色表示前向算值，红色表示误差项与梯度回传，绿色表示一次梯度下降更新后的结果</text>

  <line x1="210" y1="92" x2="285" y2="92" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue12)"/>
  <text x="312" y="98" class="cn blue" font-size="15">前向传播</text>
  <line x1="520" y1="92" x2="595" y2="92" stroke="#dc2626" stroke-width="4" stroke-dasharray="9 6" marker-end="url(#arrowRed12)"/>
  <text x="622" y="98" class="cn red" font-size="15">反向传播</text>
  <line x1="860" y1="92" x2="935" y2="92" stroke="#16a34a" stroke-width="4" marker-end="url(#arrowGreen12)"/>
  <text x="970" y="98" class="cn green" font-size="15">参数更新</text>

  <rect x="40" y="120" width="1320" height="320" rx="24" ry="24" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="60" y="136" width="1160" height="40" rx="12" ry="12" fill="#dbeafe"/>
  <text x="640" y="163" text-anchor="middle" font-size="20" class="cn blue">前向阶段：x → z¹ → a¹ → z² → a² → L</text>
  <rect x="1235" y="136" width="105" height="40" rx="12" ry="12" fill="#dcfce7"/>
  <text x="1287" y="163" text-anchor="middle" font-size="18" class="cn green">更新摘要</text>

  <rect x="110" y="188" width="110" height="58" rx="14" ry="14" fill="#e0f2fe" stroke="#2563eb" stroke-width="2"/>
  <text x="165" y="213" text-anchor="middle" font-size="18" class="cn blue">输入 x</text>
  <text x="165" y="234" text-anchor="middle" font-size="16" class="math blue">[0.05, 0.10]ᵀ</text>

  <rect x="404" y="184" width="140" height="66" rx="16" ry="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="474" y="210" text-anchor="middle" font-size="18" class="cn blue">隐藏层净输入 z¹</text>
  <text x="474" y="232" text-anchor="middle" font-size="16" class="math blue">[0.3775, 0.3925]ᵀ</text>

  <rect x="760" y="184" width="140" height="66" rx="16" ry="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="830" y="210" text-anchor="middle" font-size="18" class="cn blue">输出层净输入 z²</text>
  <text x="830" y="232" text-anchor="middle" font-size="16" class="math blue">[1.1059, 1.2249]ᵀ</text>

  <circle cx="165" cy="292" r="48" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
  <text x="165" y="286" text-anchor="middle" font-size="22" class="math blue">x₁</text>
  <text x="165" y="312" text-anchor="middle" font-size="18" class="math blue">0.05</text>

  <circle cx="165" cy="388" r="48" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
  <text x="165" y="382" text-anchor="middle" font-size="22" class="math blue">x₂</text>
  <text x="165" y="408" text-anchor="middle" font-size="18" class="math blue">0.10</text>

  <circle cx="474" cy="292" r="56" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="474" y="277" text-anchor="middle" font-size="22" class="math blue">h₁</text>
  <text x="474" y="302" text-anchor="middle" font-size="16" class="math blue">a = 0.5933</text>
  <text x="474" y="326" text-anchor="middle" font-size="15" class="math red">δ¹₁ = 0.00877</text>

  <circle cx="474" cy="388" r="56" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="474" y="373" text-anchor="middle" font-size="22" class="math blue">h₂</text>
  <text x="474" y="398" text-anchor="middle" font-size="16" class="math blue">a = 0.5969</text>
  <text x="474" y="422" text-anchor="middle" font-size="15" class="math red">δ¹₂ = 0.00995</text>

  <circle cx="830" cy="292" r="56" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="830" y="268" text-anchor="middle" font-size="22" class="math blue">o₁</text>
  <text x="830" y="292" text-anchor="middle" font-size="16" class="math blue">a = 0.7514</text>
  <text x="830" y="314" text-anchor="middle" font-size="15" class="math blue">t = 0.01</text>
  <text x="830" y="336" text-anchor="middle" font-size="15" class="math red">δ²₁ = 0.13850</text>

  <circle cx="830" cy="388" r="56" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="830" y="364" text-anchor="middle" font-size="22" class="math blue">o₂</text>
  <text x="830" y="388" text-anchor="middle" font-size="16" class="math blue">a = 0.7729</text>
  <text x="830" y="410" text-anchor="middle" font-size="15" class="math blue">t = 0.99</text>
  <text x="830" y="432" text-anchor="middle" font-size="15" class="math red">δ²₂ = -0.03810</text>

  <rect x="1082" y="198" width="180" height="72" rx="18" ry="18" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="1172" y="224" text-anchor="middle" font-size="18" class="cn" fill="#3730a3">目标向量 t</text>
  <text x="1172" y="250" text-anchor="middle" font-size="16" class="math" fill="#4338ca">[0.01, 0.99]ᵀ</text>

  <rect x="1068" y="304" width="220" height="96" rx="18" ry="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5"/>
  <text x="1178" y="334" text-anchor="middle" font-size="24" class="cn red">损失 L</text>
  <text x="1178" y="362" text-anchor="middle" font-size="16" class="math red">0.5‖a² - t‖²</text>
  <text x="1178" y="388" text-anchor="middle" font-size="18" class="math red">≈ 0.29837</text>

  <line x1="214" y1="280" x2="420" y2="280" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue12)"/>
  <text x="286" y="264" text-anchor="middle" font-size="15" class="math blue">w₁ = 0.15</text>
  <text x="286" y="306" text-anchor="middle" font-size="14" class="math red">∂L/∂w₁ = 0.000439</text>

  <line x1="214" y1="376" x2="420" y2="304" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue12)"/>
  <text x="304" y="336" text-anchor="middle" font-size="15" class="math blue">w₂ = 0.20</text>
  <text x="314" y="370" text-anchor="middle" font-size="14" class="math red">∂L/∂w₂ = 0.000877</text>

  <line x1="214" y1="304" x2="420" y2="376" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue12)"/>
  <text x="304" y="316" text-anchor="middle" font-size="15" class="math blue">w₃ = 0.25</text>
  <text x="314" y="350" text-anchor="middle" font-size="14" class="math red">∂L/∂w₃ = 0.000498</text>

  <line x1="214" y1="400" x2="420" y2="400" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue12)"/>
  <text x="286" y="388" text-anchor="middle" font-size="15" class="math blue">w₄ = 0.30</text>
  <text x="286" y="424" text-anchor="middle" font-size="14" class="math red">∂L/∂w₄ = 0.000995</text>

  <line x1="530" y1="280" x2="776" y2="280" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue12)"/>
  <text x="622" y="262" text-anchor="middle" font-size="15" class="math blue">w₅ = 0.40</text>
  <text x="622" y="304" text-anchor="middle" font-size="14" class="math red">∂L/∂w₅ = 0.08217</text>

  <line x1="530" y1="376" x2="776" y2="304" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue12)"/>
  <text x="650" y="336" text-anchor="middle" font-size="15" class="math blue">w₆ = 0.45</text>
  <text x="650" y="370" text-anchor="middle" font-size="14" class="math red">∂L/∂w₆ = 0.08267</text>

  <line x1="530" y1="304" x2="776" y2="376" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue12)"/>
  <text x="650" y="316" text-anchor="middle" font-size="15" class="math blue">w₇ = 0.50</text>
  <text x="650" y="350" text-anchor="middle" font-size="14" class="math red">∂L/∂w₇ = -0.02260</text>

  <line x1="530" y1="400" x2="776" y2="400" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue12)"/>
  <text x="622" y="388" text-anchor="middle" font-size="15" class="math blue">w₈ = 0.55</text>
  <text x="622" y="424" text-anchor="middle" font-size="14" class="math red">∂L/∂w₈ = -0.02274</text>

  <line x1="886" y1="292" x2="1068" y2="338" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue12)"/>
  <line x1="886" y1="388" x2="1068" y2="366" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue12)"/>
  <text x="955" y="248" text-anchor="middle" font-size="15" class="math blue">b² = [0.60, 0.60]ᵀ</text>
  <text x="552" y="198" text-anchor="middle" font-size="15" class="math blue">b¹ = [0.35, 0.35]ᵀ</text>

  <line x1="1068" y1="440" x2="886" y2="440" stroke="#dc2626" stroke-width="4" stroke-dasharray="9 6" marker-end="url(#arrowRed12)"/>
  <text x="972" y="430" text-anchor="middle" font-size="15" class="math red">从 L 回传 δ²</text>
  <line x1="774" y1="460" x2="530" y2="460" stroke="#dc2626" stroke-width="4" stroke-dasharray="9 6" marker-end="url(#arrowRed12)"/>
  <text x="652" y="450" text-anchor="middle" font-size="15" class="math red">(W²)ᵀδ² ⊙ σ'(z¹) = δ¹</text>

  <rect x="70" y="488" width="400" height="194" rx="20" ry="20" fill="#fef2f2" stroke="#f87171" stroke-width="2"/>
  <text x="270" y="520" text-anchor="middle" font-size="20" class="cn red">反向阶段的两个中心量</text>
  <text x="100" y="556" font-size="18" class="math red">δ² = [0.13850, -0.03810]ᵀ</text>
  <text x="100" y="586" font-size="18" class="math red">∂L/∂W² = δ²(a¹)ᵀ</text>
  <text x="100" y="614" font-size="16" class="math red">≈ [[0.08217, 0.08267],</text>
  <text x="128" y="638" font-size="16" class="math red">   [-0.02260, -0.02274]]</text>
  <text x="100" y="666" font-size="16" class="cn red">输出层先把“损失对输出的敏感度”</text>
  <text x="100" y="688" font-size="16" class="cn red">与 sigmoid 的局部导数结合成 δ²。</text>

  <rect x="500" y="488" width="400" height="194" rx="20" ry="20" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="700" y="520" text-anchor="middle" font-size="20" class="cn" fill="#c2410c">隐藏层的梯度汇聚</text>
  <text x="530" y="556" font-size="18" class="math" fill="#c2410c">δ¹ = [0.00877, 0.00995]ᵀ</text>
  <text x="530" y="586" font-size="18" class="math" fill="#c2410c">∂L/∂W¹ = δ¹xᵀ</text>
  <text x="530" y="614" font-size="16" class="math" fill="#c2410c">≈ [[0.000439, 0.000877],</text>
  <text x="558" y="638" font-size="16" class="math" fill="#c2410c">   [0.000498, 0.000995]]</text>
  <text x="530" y="666" font-size="16" class="cn" fill="#c2410c">隐藏层不是重新从头求导，而是把</text>
  <text x="530" y="688" font-size="16" class="cn" fill="#c2410c">两条输出路径的贡献汇总后再乘局部导数。</text>

  <rect x="930" y="488" width="400" height="194" rx="20" ry="20" fill="#f0fdf4" stroke="#4ade80" stroke-width="2"/>
  <text x="1130" y="520" text-anchor="middle" font-size="20" class="cn green">一次更新后的结果</text>
  <text x="960" y="556" font-size="17" class="math green">W¹_new ≈ [[0.1498, 0.1996], [0.2498, 0.2995]]</text>
  <text x="960" y="584" font-size="17" class="math green">b¹_new ≈ [0.3456, 0.3450]ᵀ</text>
  <text x="960" y="612" font-size="17" class="math green">W²_new ≈ [[0.3589, 0.4087], [0.5113, 0.5614]]</text>
  <text x="960" y="640" font-size="17" class="math green">b²_new ≈ [0.5308, 0.6190]ᵀ</text>
  <text x="960" y="668" font-size="18" class="math green">L: 0.29837 → 0.28047</text>
  <text x="960" y="692" font-size="16" class="cn green">这一轮迭代表明：沿梯度反方向更新后，损失确实下降。</text>
</svg>
