<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640">
  <defs>
    <marker id="arrowBlue2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrowOrange2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="1200" height="640" fill="#ffffff"/>
  <text x="600" y="42" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">图 2  计算图上的链式法则：局部导数、路径连乘与多路径求和</text>

  <rect x="120" y="72" rx="18" ry="18" width="960" height="80" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="600" y="106" text-anchor="middle" font-size="24" font-family="Times New Roman, Arial" fill="#111827">e = (a + b)(b + 1),   c = a + b,   d = b + 1,   e = cd</text>
  <text x="600" y="136" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#4b5563">前向阶段先算节点数值；反向阶段沿相反方向把局部导数组织成全局梯度。</text>

  <circle cx="170" cy="250" r="46" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
  <text x="170" y="244" text-anchor="middle" font-size="26" font-family="Times New Roman, Arial" fill="#1e3a8a">a</text>
  <text x="170" y="274" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1d4ed8">= 2</text>

  <circle cx="170" cy="390" r="46" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
  <text x="170" y="384" text-anchor="middle" font-size="26" font-family="Times New Roman, Arial" fill="#1e3a8a">b</text>
  <text x="170" y="414" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1d4ed8">= 1</text>

  <rect x="392" y="198" rx="18" ry="18" width="140" height="104" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5"/>
  <text x="462" y="236" text-anchor="middle" font-size="24" font-family="Times New Roman, Arial" fill="#3730a3">c = a + b</text>
  <text x="462" y="274" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#4338ca">= 3</text>

  <rect x="392" y="338" rx="18" ry="18" width="140" height="104" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="462" y="376" text-anchor="middle" font-size="24" font-family="Times New Roman, Arial" fill="#9a3412">d = b + 1</text>
  <text x="462" y="414" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#b45309">= 2</text>

  <rect x="708" y="268" rx="18" ry="18" width="164" height="104" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5"/>
  <text x="790" y="306" text-anchor="middle" font-size="24" font-family="Times New Roman, Arial" fill="#991b1b">e = cd</text>
  <text x="790" y="344" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#b91c1c">= 6</text>

  <line x1="216" y1="250" x2="392" y2="250" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue2)"/>
  <line x1="202" y1="358" x2="392" y2="272" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue2)"/>
  <line x1="216" y1="390" x2="392" y2="390" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue2)"/>
  <line x1="532" y1="250" x2="708" y2="304" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue2)"/>
  <line x1="532" y1="390" x2="708" y2="336" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue2)"/>

  <text x="300" y="234" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#374151">∂c/∂a = 1</text>
  <text x="312" y="298" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#374151">∂c/∂b = 1</text>
  <text x="300" y="376" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#374151">∂d/∂b = 1</text>
  <text x="626" y="256" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#374151">∂e/∂c = d = 2</text>
  <text x="626" y="394" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#374151">∂e/∂d = c = 3</text>

  <line x1="202" y1="358" x2="392" y2="272" stroke="#dc2626" stroke-width="6" marker-end="url(#arrowRed2)" opacity="0.9"/>
  <line x1="532" y1="250" x2="708" y2="304" stroke="#dc2626" stroke-width="6" marker-end="url(#arrowRed2)" opacity="0.9"/>
  <line x1="216" y1="390" x2="392" y2="390" stroke="#f59e0b" stroke-width="6" marker-end="url(#arrowOrange2)" opacity="0.9"/>
  <line x1="532" y1="390" x2="708" y2="336" stroke="#f59e0b" stroke-width="6" marker-end="url(#arrowOrange2)" opacity="0.9"/>

  <rect x="90" y="490" rx="16" ry="16" width="280" height="96" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="230" y="525" text-anchor="middle" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e3a8a">单一路径：对 a 求导</text>
  <text x="230" y="560" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#1d4ed8">∂e/∂a = (∂e/∂c)(∂c/∂a) = 2 × 1 = 2</text>

  <rect x="410" y="490" rx="16" ry="16" width="320" height="96" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="570" y="525" text-anchor="middle" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#991b1b">经 c 的路径贡献</text>
  <text x="570" y="560" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#b91c1c">(∂e/∂c)(∂c/∂b) = 2 × 1 = 2</text>

  <rect x="770" y="490" rx="16" ry="16" width="320" height="96" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="930" y="525" text-anchor="middle" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#9a3412">经 d 的路径贡献</text>
  <text x="930" y="560" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#c2410c">(∂e/∂d)(∂d/∂b) = 3 × 1 = 3</text>

  <text x="930" y="606" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#111827">∂e/∂b = 2 + 3 = 5</text>
</svg>
