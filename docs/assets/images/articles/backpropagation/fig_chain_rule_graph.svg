<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460">
  <rect width="1200" height="460" fill="#ffffff"/>
  <defs>
    <marker id="arrowBlue2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <text x="600" y="42" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">图 2  计算图上的链式法则</text>
  <text x="600" y="74" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#4b5563">例子：L = loss(σ(w₁x₁ + w₂x₂ + b), y)</text>

  <circle cx="120" cy="170" r="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="178" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e3a8a">x₁</text>

  <circle cx="120" cy="290" r="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="298" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e3a8a">x₂</text>

  <circle cx="300" cy="170" r="40" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="300" y="178" text-anchor="middle" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#3730a3">× w₁</text>

  <circle cx="300" cy="290" r="40" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="300" y="298" text-anchor="middle" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#3730a3">× w₂</text>

  <circle cx="470" cy="230" r="52" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="470" y="224" text-anchor="middle" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">求和</text>
  <text x="470" y="252" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#374151">s = w₁x₁ + w₂x₂ + b</text>

  <circle cx="660" cy="230" r="48" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="660" y="224" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#166534">σ</text>
  <text x="660" y="252" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#166534">a = σ(s)</text>

  <rect x="810" y="188" rx="16" ry="16" width="170" height="84" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="895" y="220" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#991b1b">损失 L</text>
  <text x="895" y="248" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#b91c1c">L = loss(a, y)</text>

  <line x1="160" y1="170" x2="260" y2="170" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue2)"/>
  <line x1="160" y1="290" x2="260" y2="290" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue2)"/>
  <line x1="336" y1="184" x2="430" y2="214" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue2)"/>
  <line x1="336" y1="276" x2="430" y2="246" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue2)"/>
  <line x1="522" y1="230" x2="612" y2="230" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue2)"/>
  <line x1="708" y1="230" x2="810" y2="230" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue2)"/>

  <line x1="810" y1="320" x2="708" y2="320" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed2)"/>
  <line x1="612" y1="320" x2="522" y2="320" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed2)"/>
  <line x1="430" y1="340" x2="336" y2="304" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed2)"/>
  <line x1="430" y1="360" x2="336" y2="196" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed2)" opacity="0.9"/>

  <text x="760" y="348" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#dc2626">从右向左乘局部导数</text>
  <rect x="110" y="370" rx="12" ry="12" width="980" height="58" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="600" y="403" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#111827">∂L/∂w₁ = (∂L/∂a) · (∂a/∂s) · (∂s/∂w₁) = (∂L/∂a) · σ'(s) · x₁</text>
</svg>