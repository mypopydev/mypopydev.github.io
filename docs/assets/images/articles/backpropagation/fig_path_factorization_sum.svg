<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <marker id="arrowGray9" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#6b7280"/>
    </marker>
    <marker id="arrowBlue9" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed9" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1200" height="560" fill="#ffffff"/>
  <text x="600" y="42" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">图 5  从逐条路径求和到共享节点处的因子化</text>

  <rect x="70" y="90" rx="20" ry="20" width="500" height="360" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="320" y="126" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#9a3412">若把所有完整路径逐条展开</text>

  <circle cx="140" cy="250" r="42" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
  <text x="140" y="258" text-anchor="middle" font-size="26" font-family="Times New Roman, Arial" fill="#1e3a8a">X</text>
  <rect x="260" y="200" rx="18" ry="18" width="120" height="100" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5"/>
  <text x="320" y="244" text-anchor="middle" font-size="24" font-family="Times New Roman, Arial" fill="#3730a3">Y</text>
  <text x="320" y="276" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#4338ca">共享中间节点</text>
  <circle cx="500" cy="250" r="42" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5"/>
  <text x="500" y="258" text-anchor="middle" font-size="26" font-family="Times New Roman, Arial" fill="#991b1b">Z</text>

  <line x1="182" y1="222" x2="260" y2="222" stroke="#6b7280" stroke-width="3.5" marker-end="url(#arrowGray9)"/>
  <line x1="182" y1="250" x2="260" y2="250" stroke="#6b7280" stroke-width="3.5" marker-end="url(#arrowGray9)"/>
  <line x1="182" y1="278" x2="260" y2="278" stroke="#6b7280" stroke-width="3.5" marker-end="url(#arrowGray9)"/>
  <line x1="380" y1="222" x2="458" y2="222" stroke="#6b7280" stroke-width="3.5" marker-end="url(#arrowGray9)"/>
  <line x1="380" y1="250" x2="458" y2="250" stroke="#6b7280" stroke-width="3.5" marker-end="url(#arrowGray9)"/>
  <line x1="380" y1="278" x2="458" y2="278" stroke="#6b7280" stroke-width="3.5" marker-end="url(#arrowGray9)"/>

  <text x="220" y="214" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#374151">α</text>
  <text x="220" y="242" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#374151">β</text>
  <text x="220" y="306" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#374151">γ</text>
  <text x="420" y="214" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#374151">δ</text>
  <text x="420" y="242" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#374151">ε</text>
  <text x="420" y="306" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#374151">ζ</text>

  <rect x="110" y="330" rx="14" ry="14" width="420" height="90" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="320" y="362" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#7c2d12">直接展开时，前缀与后缀会交叉组合：</text>
  <text x="320" y="394" text-anchor="middle" font-size="19" font-family="Times New Roman, Arial" fill="#9a3412">αδ + αε + αζ + βδ + βε + βζ + γδ + γε + γζ</text>
  <text x="320" y="418" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#b45309">共有 3 × 3 = 9 项；图再深一点，项数会继续相乘。</text>

  <rect x="630" y="90" rx="20" ry="20" width="500" height="360" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="880" y="126" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e3a8a">反向传播真正做的是共享子问题复用</text>

  <circle cx="700" cy="250" r="42" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
  <text x="700" y="258" text-anchor="middle" font-size="26" font-family="Times New Roman, Arial" fill="#1e3a8a">X</text>
  <rect x="820" y="200" rx="18" ry="18" width="120" height="100" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="880" y="244" text-anchor="middle" font-size="24" font-family="Times New Roman, Arial" fill="#166534">Y</text>
  <text x="880" y="276" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#15803d">先在这里累积</text>
  <circle cx="1060" cy="250" r="42" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5"/>
  <text x="1060" y="258" text-anchor="middle" font-size="26" font-family="Times New Roman, Arial" fill="#991b1b">Z</text>

  <line x1="742" y1="222" x2="820" y2="222" stroke="#2563eb" stroke-width="3.5" marker-end="url(#arrowBlue9)"/>
  <line x1="742" y1="250" x2="820" y2="250" stroke="#2563eb" stroke-width="3.5" marker-end="url(#arrowBlue9)"/>
  <line x1="742" y1="278" x2="820" y2="278" stroke="#2563eb" stroke-width="3.5" marker-end="url(#arrowBlue9)"/>
  <line x1="940" y1="222" x2="1018" y2="222" stroke="#dc2626" stroke-width="3.5" marker-end="url(#arrowRed9)"/>
  <line x1="940" y1="250" x2="1018" y2="250" stroke="#dc2626" stroke-width="3.5" marker-end="url(#arrowRed9)"/>
  <line x1="940" y1="278" x2="1018" y2="278" stroke="#dc2626" stroke-width="3.5" marker-end="url(#arrowRed9)"/>

  <text x="780" y="214" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#1d4ed8">α</text>
  <text x="780" y="242" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#1d4ed8">β</text>
  <text x="780" y="306" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#1d4ed8">γ</text>
  <text x="980" y="214" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#b91c1c">δ</text>
  <text x="980" y="242" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#b91c1c">ε</text>
  <text x="980" y="306" text-anchor="middle" font-size="20" font-family="Times New Roman, Arial" fill="#b91c1c">ζ</text>

  <rect x="660" y="156" rx="12" ry="12" width="210" height="30" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="765" y="177" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e3a8a">先把前缀贡献汇总为 α + β + γ</text>
  <rect x="892" y="156" rx="12" ry="12" width="210" height="30" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="997" y="177" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#991b1b">再和后缀汇总 δ + ε + ζ 组合</text>

  <rect x="680" y="330" rx="14" ry="14" width="400" height="90" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="880" y="362" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e40af">因子化后，不必逐条重复计算完整路径：</text>
  <text x="880" y="394" text-anchor="middle" font-size="19" font-family="Times New Roman, Arial" fill="#1d4ed8">∂Z/∂X = (α + β + γ)(δ + ε + ζ)</text>
  <text x="880" y="418" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#2563eb">共享节点把许多路径共同拥有的中间子问题复用起来。</text>

  <rect x="150" y="476" rx="16" ry="16" width="900" height="54" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="600" y="510" text-anchor="middle" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">关键直觉：反向传播不是沿每条完整路径各算一遍，而是在共享节点处先累积可复用的局部贡献，再继续传递。</text>
</svg>
