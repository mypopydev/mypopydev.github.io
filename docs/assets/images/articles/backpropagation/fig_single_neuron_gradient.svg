<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <rect width="1200" height="520" fill="#ffffff"/>
  <defs>
    <marker id="arrowBlue5" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed5" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <text x="600" y="42" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">图 9  单神经元梯度推导图</text>
  <text x="600" y="74" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#4b5563">例子：L = loss(σ(w₁x₁ + w₂x₂ + b), y)</text>

  <circle cx="120" cy="170" r="38" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="178" text-anchor="middle" font-size="24" font-family="Times New Roman, Arial" fill="#1e3a8a">x₁</text>
  <circle cx="120" cy="290" r="38" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="298" text-anchor="middle" font-size="24" font-family="Times New Roman, Arial" fill="#1e3a8a">x₂</text>

  <rect x="235" y="132" rx="16" ry="16" width="135" height="76" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="302" y="178" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#3730a3">× w₁</text>
  <rect x="235" y="252" rx="16" ry="16" width="135" height="76" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="302" y="298" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#3730a3">× w₂</text>

  <circle cx="495" cy="230" r="54" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="495" y="220" text-anchor="middle" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">求和</text>
  <text x="495" y="248" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#374151">z = w₁x₁ + w₂x₂ + b</text>

  <circle cx="685" cy="230" r="50" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="685" y="223" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#166534">激活 σ</text>
  <text x="685" y="250" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#166534">a = σ(z)</text>

  <rect x="850" y="184" rx="18" ry="18" width="190" height="92" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="945" y="220" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#991b1b">损失 L</text>
  <text x="945" y="248" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#b91c1c">L = loss(a, y)</text>

  <line x1="158" y1="170" x2="235" y2="170" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue5)"/>
  <line x1="158" y1="290" x2="235" y2="290" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue5)"/>
  <line x1="370" y1="170" x2="448" y2="210" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue5)"/>
  <line x1="370" y1="290" x2="448" y2="250" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue5)"/>
  <line x1="549" y1="230" x2="635" y2="230" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue5)"/>
  <line x1="735" y1="230" x2="850" y2="230" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue5)"/>

  <line x1="850" y1="332" x2="735" y2="332" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed5)"/>
  <text x="793" y="320" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#dc2626">∂L/∂a</text>
  <line x1="635" y1="332" x2="549" y2="332" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed5)"/>
  <text x="592" y="320" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#dc2626">× σ'(z)</text>
  <line x1="448" y1="352" x2="370" y2="304" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed5)"/>
  <line x1="448" y1="372" x2="370" y2="196" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed5)"/>
  <text x="314" y="112" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#dc2626">× x₁</text>
  <text x="314" y="358" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#dc2626">× x₂</text>

  <rect x="110" y="410" rx="14" ry="14" width="980" height="70" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="600" y="442" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#111827">∂L/∂w₁ = (∂L/∂a) · (∂a/∂z) · (∂z/∂w₁) = (∂L/∂a) · σ'(z) · x₁</text>
  <text x="600" y="468" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#111827">∂L/∂w₂ = (∂L/∂a) · σ'(z) · x₂,   ∂L/∂b = (∂L/∂a) · σ'(z)</text>
</svg>