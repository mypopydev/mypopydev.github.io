<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <rect width="1200" height="500" fill="#ffffff"/>
  <defs>
    <marker id="arrowRed6" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <text x="600" y="42" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#111827">图 6  梯度消失示意图</text>
  <text x="600" y="74" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#4b5563">当很多层的局部导数都小于 1 时，反向连乘会让早期层几乎收不到更新信号</text>

  <rect x="120" y="200" rx="16" ry="16" width="120" height="88" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="180" y="252" text-anchor="middle" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#312e81">第 1 层</text>
  <rect x="300" y="200" rx="16" ry="16" width="120" height="88" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="360" y="252" text-anchor="middle" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#312e81">第 2 层</text>
  <rect x="480" y="200" rx="16" ry="16" width="120" height="88" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="540" y="252" text-anchor="middle" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#312e81">第 3 层</text>
  <rect x="660" y="200" rx="16" ry="16" width="120" height="88" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="720" y="252" text-anchor="middle" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#312e81">第 4 层</text>
  <rect x="840" y="200" rx="16" ry="16" width="120" height="88" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="900" y="252" text-anchor="middle" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#991b1b">损失 L</text>

  <line x1="840" y1="155" x2="780" y2="155" stroke="#dc2626" stroke-width="5" marker-end="url(#arrowRed6)"/>
  <line x1="660" y1="155" x2="600" y2="155" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed6)"/>
  <line x1="480" y1="155" x2="420" y2="155" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed6)"/>
  <line x1="300" y1="155" x2="240" y2="155" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed6)"/>

  <text x="810" y="132" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#dc2626">× 0.5</text>
  <text x="630" y="132" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#dc2626">× 0.4</text>
  <text x="450" y="132" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#dc2626">× 0.3</text>
  <text x="270" y="132" text-anchor="middle" font-size="18" font-family="Times New Roman, Arial" fill="#dc2626">× 0.2</text>

  <rect x="120" y="340" rx="16" ry="16" width="840" height="96" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="540" y="376" text-anchor="middle" font-size="22" font-family="Times New Roman, Arial" fill="#111827">若输出层梯度约为 1，则传回第 1 层时约为 1 × 0.5 × 0.4 × 0.3 × 0.2 = 0.012</text>
  <text x="540" y="408" text-anchor="middle" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#374151">这意味着越靠前的层越难更新，深层 sigmoid/tanh 网络尤其明显</text>

  <rect x="990" y="178" rx="14" ry="14" width="140" height="120" fill="#ecfccb" stroke="#65a30d" stroke-width="2"/>
  <text x="1060" y="214" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#3f6212">常见缓解</text>
  <text x="1060" y="244" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#3f6212">ReLU</text>
  <text x="1060" y="268" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#3f6212">残差连接</text>
  <text x="1060" y="292" text-anchor="middle" font-size="16" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#3f6212">归一化</text>
</svg>