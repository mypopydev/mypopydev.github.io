          - 现在，写代码很便宜: series/agentic-engineering-patterns/writing_code_is_cheap_now_demo_zh.md
          - 把你会做的事囤起来: series/agentic-engineering-patterns/hoard_things_you_know_how_to_do_demo_zh.md
          - AI 应该帮助我们产出更好的代码: series/agentic-engineering-patterns/ai_should_help_us_produce_better_code_demo_zh.md
          - 反模式：有些事要避免: series/agentic-engineering-patterns/anti_patterns_things_to_avoid_demo_zh.md
      - 协作工作流:
